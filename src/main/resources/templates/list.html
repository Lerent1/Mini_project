<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Danh sach cong viec</h3>
        <a href="/add" class="btn btn-primary">Them moi</a>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <div th:if="${#lists.isEmpty(todos)}" class="alert alert-warning">
                Chua co cong viec nao
            </div>

            <table class="table table-bordered table-hover" th:if="${!#lists.isEmpty(todos)}">
                <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Noi dung</th>
                    <th>Han</th>
                    <th>Trang thai</th>
                    <th>Uu tien</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="t : ${todos}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.content}"></td>
                    <td th:text="${t.dueDate}"></td>

                    <td>
                        <span class="badge badge-warning" th:if="${t.status == 'PENDING'}">PENDING</span>
                        <span class="badge badge-success" th:if="${t.status == 'DONE'}">DONE</span>
                    </td>

                    <td>
                        <span class="badge badge-secondary" th:if="${t.priority == 'LOW'}">LOW</span>
                        <span class="badge badge-info" th:if="${t.priority == 'MEDIUM'}">MEDIUM</span>
                        <span class="badge badge-danger" th:if="${t.priority == 'HIGH'}">HIGH</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
