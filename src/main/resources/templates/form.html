<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    Them cong viec
                </div>

                <div class="card-body">
                    <form th:action="@{/save}" method="post" th:object="${todo}">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{status}">

                        <div class="form-group">
                            <label>Noi dung</label>
                            <input type="text" class="form-control" th:field="*{content}">
                            <small class="text-danger" th:errors="*{content}"></small>
                        </div>

                        <div class="form-group">
                            <label>Han</label>
                            <input type="date" class="form-control" th:field="*{dueDate}">
                            <small class="text-danger" th:errors="*{dueDate}"></small>
                        </div>

                        <div class="form-group">
                            <label>Do uu tien</label>
                            <select class="form-control" th:field="*{priority}">
                                <option value="">Chon</option>
                                <option value="LOW">LOW</option>
                                <option value="MEDIUM">MEDIUM</option>
                                <option value="HIGH">HIGH</option>
                            </select>
                        </div>

                        <div class="flex justify-content-between">
                            <a th:href="@{/}" class="btn btn-secondary">Quay lai</a>

                            <button type="submit" class="btn btn-success">
                                <span th:text="${todo.id == null} ? 'Them' : 'Cap nhat'"></span>
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
